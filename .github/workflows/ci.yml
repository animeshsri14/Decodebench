name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run CPU tests
        run: python -m pytest -m "not gpu" -v
      - name: Build and test C++ CPU reference
        run: |
          cmake -S validation -B validation/build-ci -DDECODEBENCH_CPU_ONLY=ON
          cmake --build validation/build-ci -j2
          ctest --test-dir validation/build-ci --output-on-failure

  # Package must be installable from a built wheel, not just editable mode.
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Install from wheel and smoke-test
        run: |
          pip install dist/*.whl
          python -c "import decodebench"
          decodebench demo f1 --dry-run

  # Compile-only CUDA build (no GPU on the runner): catches nvcc breakage
  # per target architecture. Runtime GPU behavior is validated on the
  # benchmark machines, not here.
  cuda-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda-arch: ["75", "89", "120"]
    steps:
      - uses: actions/checkout@v4
      # v0.2.35: first tag that supports CUDA 12.9.x (v0.2.21 topped out at
      # 12.8.0, which is why the version string was rejected). cudart-dev and
      # libcublas-dev supply the headers the .cu targets and cuBLAS calibrate
      # compile/link against; without the -dev packages the build cannot find
      # cuda_runtime.h / cublas_v2.h.
      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "12.9.0"
          method: network
          sub-packages: '["nvcc", "cudart", "cudart-dev"]'
          non-cuda-sub-packages: '["libcublas", "libcublas-dev"]'
      - name: Configure
        run: >
          cmake -S validation -B validation/build-cuda
          -DCMAKE_CUDA_ARCHITECTURES=${{ matrix.cuda-arch }}
          -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build validation/build-cuda -j2
      - name: Assert GPU targets were actually built
        run: |
          test -x validation/build-cuda/bench_variant
          test -x validation/build-cuda/calibrate
