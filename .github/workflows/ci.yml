name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run CPU tests
        run: python -m pytest -m "not gpu" -v
      - name: Build and test C++ CPU reference
        run: |
          cmake -S validation -B validation/build-ci -DDECODEBENCH_CPU_ONLY=ON
          cmake --build validation/build-ci -j2
          ctest --test-dir validation/build-ci --output-on-failure
