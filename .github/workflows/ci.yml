name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run CPU tests
        run: python -m pytest -m "not gpu" -v
